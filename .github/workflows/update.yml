name: Auto Update Stock Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

# 强制开启写入权限
permissions:
  contents: write

jobs:
  update-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install akshare pandas --upgrade

      - name: Run update script
        run: |
          # 先确保创建文件夹
          mkdir -p data
          python update_data.py
          # 关键排错步骤：在日志里显示到底下没下载到文件
          echo "检查数据目录内容:"
          ls -l data || echo "data 文件夹内为空"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 强制添加 data 目录下的所有 day 文件
          git add data/*.day || echo "未找到 day 文件"
          
          # 检查是否有文件变动
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "自动更新量化数据: $(date)"
            git push origin main
          else
            echo "数据未发生变化，无需提交"
          fi
